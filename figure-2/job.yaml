    benchtool:
      image: localhost:5000/wrk:latest
      #image: ghcr.io/unikraft/wayfinder/wrk:latest
      devices:
        - /dev/urandom
        - /dev/kvm
        - /dev/net/tun
      capabilities:
        - CAP_NET_ADMIN
      commands: /test.sh index.html
      monitors:
        - name: qemu-rss
          commands: cat /proc/$DOMAIN_PID/status | grep RSS | awk '{ print $2 }'
      cores: 1
      start_delay: 15
      duration: 30
    results:
      - name: throughput
        path: /results/throughput.txt
        type: float
