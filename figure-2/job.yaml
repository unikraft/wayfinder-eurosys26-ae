    fi

    if [[ ${TIMER_FREQUENCY} == "hz_300" ]]; then
      kconfig-set.sh ${MICROVM_CFG} CONFIG_HZ_300 ${CONFIG_HZ_300}
    fi

    if [[ ${TIMER_FREQUENCY} == "hz_1000" ]]; then
      kconfig-set.sh ${MICROVM_CFG} CONFIG_HZ_1000 ${CONFIG_HZ_1000}
    fi

    if [[ ${TIMER_TICK_HANDLING} == "hz_periodic" ]]; then
      kconfig-set.sh ${MICROVM_CFG} CONFIG_HZ_PERIODIC ${CONFIG_HZ_PERIODIC}
    fi

    if [[ ${TIMER_TICK_HANDLING} == "hz_periodic" ]]; then
      kconfig-set.sh ${MICROVM_CFG} CONFIG_NO_HZ_IDLE ${CONFIG_NO_HZ_IDLE}
    fi

    if [[ ${TIMER_TICK_HANDLING} == "hz_periodic" ]]; then
      kconfig-set.sh ${MICROVM_CFG} CONFIG_NO_HZ_FULL ${CONFIG_NO_HZ_FULL}
    fi

    # Hardcode big limit
    PATH_BEFORE=$(pwd)
    cd ${WORKDIR}/linux
    git apply /0001-init-Increase-env-var-limit.patch
    git apply /0001-arch-x86-Increase-cmdline-size.patch
    cd $PATH_BEFORE

    echo "Building the image"
    # Build the image
    ./scripts/build-with-configs.sh patch ${MICROVM_CFG} ${NGINX_CFG}

    echo "Generating filesystem image"
    #
    # 2. Generate filesystem image
    #
    image2rootfs.sh nginx.tar
    mkdir -p /tmp/nginx-ext3
    mount -o loop ./nginx.ext3 /tmp/nginx-ext3

    # Install network setup script here as we cannot run `u`/`mount` during the
    # container's build.
    cp -v ./scripts/busybox-x86_64 /tmp/nginx-ext3
    cp -v ./scripts/guest* /tmp/nginx-ext3
    cp -v ./load_entropy/load_entropy /tmp/nginx-ext3

    # Install musl libc
    mkdir -p /tmp/nginx-ext3/trusted
    cp -v ./scripts/libc.so /tmp/nginx-ext3/trusted/libc.so

    # Generate a variable-size payload
    mkdir -p /tmp/nginx-ext3/data/www/
    tr -dc A-Za-z0-9 </dev/urandom | head -c ${PAYLOAD_SIZE} > /tmp/nginx-ext3/data/www/index.html

    # Unmounting seals the filesystem archive
    umount /tmp/nginx-ext3

    echo "Build Done!"

